<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Report Card Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            padding: 30px;
            background: #f8f9fa;
        }

        .menu-btn {
            padding: 20px;
            background: white;
            border: 2px solid #667eea;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
            font-weight: 600;
            color: #667eea;
        }

        .menu-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .content {
            padding: 30px;
            display: none;
        }

        .content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .subjects-container {
            margin-top: 20px;
        }

        .subject-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .subject-row input {
            flex: 1;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
            margin-left: 10px;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-add {
            background: #28a745;
            color: white;
            margin-top: 10px;
        }

        .btn-add:hover {
            background: #218838;
        }

        .report-card {
            border: 3px solid #667eea;
            border-radius: 10px;
            padding: 30px;
            margin-top: 20px;
            background: #f8f9fa;
        }

        .report-card h2 {
            text-align: center;
            color: #667eea;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .report-info {
            margin-bottom: 15px;
        }

        .report-info strong {
            display: inline-block;
            width: 150px;
            color: #333;
        }

        .marks-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        .marks-table th,
        .marks-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        .marks-table th {
            background: #667eea;
            color: white;
        }

        .marks-table tr:hover {
            background: #f1f1f1;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .results-table th,
        .results-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        .results-table th {
            background: #667eea;
            color: white;
            position: sticky;
            top: 0;
        }

        .results-table tr:hover {
            background: #f1f1f1;
        }

        .grade-a {
            color: #28a745;
            font-weight: bold;
        }

        .grade-b {
            color: #17a2b8;
            font-weight: bold;
        }

        .grade-c {
            color: #ffc107;
            font-weight: bold;
        }

        .grade-fail {
            color: #dc3545;
            font-weight: bold;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .message-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .back-btn {
            margin-bottom: 20px;
        }

        .summary-card {
            display: inline-block;
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 15px;
            border: 2px solid #667eea;
        }

        .summary-card div {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 Student Report Card Management System</h1>
            <p>Manage student records and generate report cards</p>
        </div>

        <div id="mainMenu" class="menu">
            <button class="menu-btn" onclick="showSection('addStudent')">➕ Add Student Details</button>
            <button class="menu-btn" onclick="showSection('searchStudent')">🔍 Display Report Card</button>
            <button class="menu-btn" onclick="showSection('allResults')">📊 Display All Results</button>
            <button class="menu-btn" onclick="showSection('clearRecords')">🗑️ Clear Student Records</button>
        </div>

        <div id="addStudent" class="content">
            <button class="btn btn-secondary back-btn" onclick="showMenu()">← Back to Menu</button>
            <h2>Add New Student Record</h2>
            <div id="addMessage"></div>
            <form id="addStudentForm" onsubmit="addStudent(event)">
                <div class="form-group">
                    <label>Roll Number:</label>
                    <input type="text" id="rollNumber" required>
                </div>
                <div class="form-group">
                    <label>Student Name:</label>
                    <input type="text" id="studentName" required>
                </div>
                <div class="form-group">
                    <label>Department:</label>
                    <input type="text" id="department" required>
                </div>
                <div class="form-group">
                    <label>Number of Subjects:</label>
                    <input type="number" id="numSubjects" min="1" max="10" value="5" onchange="generateSubjectFields()">
                </div>
                <div class="subjects-container" id="subjectsContainer"></div>
                <button type="submit" class="btn btn-primary">Submit Student Record</button>
                <button type="button" class="btn btn-secondary" onclick="document.getElementById('addStudentForm').reset(); generateSubjectFields()">Clear Form</button>
            </form>
        </div>

        <div id="searchStudent" class="content">
            <button class="btn btn-secondary back-btn" onclick="showMenu()">← Back to Menu</button>
            <h2>Search Student Report Card</h2>
            <div id="searchMessage"></div>
            <div class="form-group">
                <label>Enter Roll Number:</label>
                <input type="text" id="searchRoll">
            </div>
            <button class="btn btn-primary" onclick="searchStudent()">Search</button>
            <div id="reportCardDisplay"></div>
        </div>

        <div id="allResults" class="content">
            <button class="btn btn-secondary back-btn" onclick="showMenu()">← Back to Menu</button>
            <h2>All Student Results (Sorted by Percentage)</h2>
            <div id="allResultsDisplay"></div>
        </div>

        <div id="clearRecords" class="content">
            <button class="btn btn-secondary back-btn" onclick="showMenu()">← Back to Menu</button>
            <h2>Clear All Student Records</h2>
            <div id="clearMessage"></div>
            <p>Are you sure you want to clear all student records? This action cannot be undone.</p>
            <button class="btn btn-danger" onclick="clearAllRecords()">Yes, Clear All Records</button>
            <button class="btn btn-secondary" onclick="showMenu()">Cancel</button>
        </div>
    </div>

    <script>
        let studentRecords = {};

        function showMenu() {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.getElementById('mainMenu').style.display = 'grid';
        }

        function showSection(sectionId) {
            document.getElementById('mainMenu').style.display = 'none';
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            
            if (sectionId === 'addStudent') {
                generateSubjectFields();
            } else if (sectionId === 'allResults') {
                displayAllResults();
            }
        }

        function generateSubjectFields() {
            const numSubjects = parseInt(document.getElementById('numSubjects').value) || 5;
            const container = document.getElementById('subjectsContainer');
            container.innerHTML = '<h3>Enter Subjects and Marks (out of 100):</h3>';
            
            for (let i = 0; i < numSubjects; i++) {
                const row = document.createElement('div');
                row.className = 'subject-row';
                row.innerHTML = `
                    <input type="text" placeholder="Subject Name" class="subject-name" required>
                    <input type="number" placeholder="Marks" class="subject-marks" min="0" max="100" step="0.01" required>
                `;
                container.appendChild(row);
            }
        }

        function calculateResult(marks) {
            const total = Object.values(marks).reduce((sum, mark) => sum + mark, 0);
            const numSubjects = Object.keys(marks).length;
            const percentage = numSubjects > 0 ? (total / (numSubjects * 100)) * 100 : 0;
            
            let grade;
            if (percentage >= 80) grade = 'A';
            else if (percentage >= 60) grade = 'B';
            else if (percentage >= 40) grade = 'C';
            else grade = 'Fail';
            
            return { total, percentage, grade };
        }

        function addStudent(event) {
            event.preventDefault();
            const msgDiv = document.getElementById('addMessage');
            
            const roll = document.getElementById('rollNumber').value.trim();
            const name = document.getElementById('studentName').value.trim();
            const department = document.getElementById('department').value.trim();
            
            if (studentRecords[roll]) {
                msgDiv.innerHTML = '<div class="message message-error">Roll Number already exists!</div>';
                return;
            }
            
            const subjectNames = Array.from(document.querySelectorAll('.subject-name')).map(input => input.value.trim());
            const subjectMarks = Array.from(document.querySelectorAll('.subject-marks')).map(input => parseFloat(input.value));
            
            if (subjectNames.some(name => !name)) {
                msgDiv.innerHTML = '<div class="message message-error">All subject names must be filled!</div>';
                return;
            }
            
            const marks = {};
            subjectNames.forEach((subject, index) => {
                marks[subject] = subjectMarks[index];
            });
            
            const result = calculateResult(marks);
            
            studentRecords[roll] = {
                name,
                department,
                subjects: subjectNames,
                marks,
                total: result.total,
                percentage: result.percentage,
                grade: result.grade
            };
            
            msgDiv.innerHTML = '<div class="message message-success">✓ Student record added successfully!</div>';
            document.getElementById('addStudentForm').reset();
            generateSubjectFields();
            
            setTimeout(() => msgDiv.innerHTML = '', 3000);
        }

        function bubbleSort(records) {
            const students = Object.entries(records);
            const n = students.length;
            
            for (let i = 0; i < n - 1; i++) {
                for (let j = 0; j < n - i - 1; j++) {
                    if (students[j][1].percentage < students[j + 1][1].percentage) {
                        [students[j], students[j + 1]] = [students[j + 1], students[j]];
                    }
                }
            }
            
            return students;
        }

        function searchStudent() {
            const roll = document.getElementById('searchRoll').value.trim();
            const msgDiv = document.getElementById('searchMessage');
            const displayDiv = document.getElementById('reportCardDisplay');
            
            if (!roll) {
                msgDiv.innerHTML = '<div class="message message-error">Please enter a roll number!</div>';
                displayDiv.innerHTML = '';
                return;
            }
            
            const student = studentRecords[roll];
            
            if (!student) {
                msgDiv.innerHTML = '<div class="message message-error">Student record not found!</div>';
                displayDiv.innerHTML = '';
                return;
            }
            
            msgDiv.innerHTML = '';
            displayReportCard(student, roll, displayDiv);
        }

        function displayReportCard(student, roll, container) {
            const gradeClass = student.grade === 'A' ? 'grade-a' : 
                              student.grade === 'B' ? 'grade-b' : 
                              student.grade === 'C' ? 'grade-c' : 'grade-fail';
            
            let marksHTML = '';
            student.subjects.forEach(subject => {
                marksHTML += `
                    <tr>
                        <td>${subject}</td>
                        <td>${student.marks[subject].toFixed(2)}</td>
                    </tr>
                `;
            });
            
            const totalPossible = student.subjects.length * 100;
            
            container.innerHTML = `
                <div class="report-card">
                    <h2>📄 REPORT CARD</h2>
                    <div class="report-info"><strong>Name:</strong> ${student.name}</div>
                    <div class="report-info"><strong>Roll No.:</strong> ${roll}</div>
                    <div class="report-info"><strong>Department:</strong> ${student.department}</div>
                    
                    <table class="marks-table">
                        <thead>
                            <tr>
                                <th>Subject</th>
                                <th>Marks</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${marksHTML}
                        </tbody>
                    </table>
                    
                    <div class="summary-card">
                        <div><strong>Total Marks:</strong> ${student.total.toFixed(2)} / ${totalPossible}</div>
                        <div><strong>Percentage:</strong> ${student.percentage.toFixed(2)}%</div>
                        <div><strong>Grade:</strong> <span class="${gradeClass}">${student.grade}</span></div>
                    </div>
                </div>
            `;
        }

        function displayAllResults() {
            const container = document.getElementById('allResultsDisplay');
            
            if (Object.keys(studentRecords).length === 0) {
                container.innerHTML = '<div class="message message-error">No student records to display!</div>';
                return;
            }
            
            const sortedStudents = bubbleSort(studentRecords);
            
            let tableHTML = `
                <table class="results-table">
                    <thead>
                        <tr>
                            <th>Roll No.</th>
                            <th>Name</th>
                            <th>Department</th>
                            <th>Total</th>
                            <th>Percentage</th>
                            <th>Grade</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            sortedStudents.forEach(([roll, student]) => {
                const gradeClass = student.grade === 'A' ? 'grade-a' : 
                                  student.grade === 'B' ? 'grade-b' : 
                                  student.grade === 'C' ? 'grade-c' : 'grade-fail';
                
                tableHTML += `
                    <tr>
                        <td>${roll}</td>
                        <td>${student.name}</td>
                        <td>${student.department}</td>
                        <td>${student.total.toFixed(2)}</td>
                        <td>${student.percentage.toFixed(2)}%</td>
                        <td><span class="${gradeClass}">${student.grade}</span></td>
                    </tr>
                `;
            });
            
            tableHTML += '</tbody></table>';
            container.innerHTML = tableHTML;
        }

        function clearAllRecords() {
            studentRecords = {};
            const msgDiv = document.getElementById('clearMessage');
            msgDiv.innerHTML = '<div class="message message-success">✓ All student records have been cleared successfully!</div>';
            setTimeout(() => showMenu(), 2000);
        }

        // Initialize on load
        generateSubjectFields();
    </script>
</body>
</html>
